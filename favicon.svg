      <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="165" cy="157" rx="72" ry="98" stroke-width="12"/>
        <ellipse cx="347" cy="157" rx="72" ry="98" stroke-width="12"/>
        <circle cx="148" cy="155" r="28" fill="#ffffff" stroke="none"/>
        <circle cx="330" cy="155" r="28" fill="#ffffff" stroke="none"/>
        <circle cx="142" cy="150" r="10" fill="#0e3ebd" stroke="none"/>
        <circle cx="324" cy="150" r="10" fill="#0e3ebd" stroke="none"/>
      </g>
      <text x="256" y="352" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="900" letter-spacing="-1" fill="#ffffff">EYEGOTCHA</text>
      <text x="256" y="410" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="500" fill="#ffffff">당신이 필요한 아이템</text>
    </g>
