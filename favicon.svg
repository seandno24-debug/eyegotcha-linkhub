      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.14"/>
    </filter>
  </defs>
  <g clip-path="url(#clipCircle)">
    <rect width="512" height="512" fill="#0e3ebd"/>
