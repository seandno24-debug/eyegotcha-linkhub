<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <title>션디노 링크허브</title>
  <meta name="description" content="션디노 링크허브" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="public-body">
  <main class="public-main">
    <section class="hero-shell">
      <div class="hero-copy">
        <img class="hero-logo" src="eyegotcha-logo.svg" alt="아이갓챠 로고" />
        <h1>아이갓챠</h1>
        <p class="hero-subtitle">당신이 필요한 아이템</p>
      </div>
      <a class="hero-admin" href="admin.html" aria-label="관리자 페이지">
        <span aria-hidden="true">⚙</span>
      </a>
    </section>

    <section class="affiliate-banner" aria-label="쿠팡파트너스 안내문구">
      <div class="affiliate-banner-track">
        <span>쿠팡파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</span>
        <span>쿠팡파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</span>
      </div>
    </section>

    <section class="search-shell">
      <input id="searchInput" type="search" placeholder="검색어를 입력해주세요." autocomplete="off" />
      <p id="resultCount" class="result-count" aria-live="polite"></p>
    </section>

    <p class="search-tip">👆 상품 번호 검색하시면 찾으실 수 있어요 👆</p>

    <section id="loadingBar" class="loading-inline" aria-live="polite">
      <span class="loading-dot"></span>
      <span>상품 불러오는 중</span>
    </section>

    <section id="productGrid" class="product-list" aria-label="상품 목록"></section>

    <p id="loadError" class="list-empty" hidden>상품을 불러오지 못했어요.</p>
    <p id="emptyState" class="list-empty" hidden>검색 결과가 없어요.</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
